name: 📲 Telegram File Downloader2

on:
  workflow_dispatch:
    inputs:
      telegram_links:
        description: '🔗 Telegram links (separate with commas, spaces, or new lines)'
        required: true
        type: string

      password:
        description: '🔐 Password for archive (optional)'
        required: false
        default: ''
        type: string

jobs:
  download-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update -qq

          sudo apt-get install -y \
            curl \
            jq \
            openssl \
            bc \
            zip \
            unzip \
            python3 \
            aria2 \
            p7zip-full \
            wget \
            gh

          echo "✅ Dependencies installed"

      - name: 📁 Create folders
        run: |
          mkdir -p downloads
          mkdir -p temp

      ####################################################################
      # Resolve Telegram Links
      ####################################################################

      - name: 📋 Resolve Telegram Links
        run: |
          python3 << 'PYEOF'
          import os
          import re
          import json
          import subprocess
          import urllib.parse

          raw_input = """${{ github.event.inputs.telegram_links }}"""

          links = re.split(r'[,\s\n]+', raw_input)

          links = [
              x.strip()
              for x in links
              if x.strip().startswith("http")
          ]

          # Remove duplicates
          seen = set()
          unique_links = []

          for link in links:
              if link not in seen:
                  seen.add(link)
                  unique_links.append(link)

          if not unique_links:
              print("❌ No valid links")
              raise SystemExit(1)

          downloads = []
          failed = []

          print(f"📋 Found {len(unique_links)} unique link(s)")

          for idx, telegram_link in enumerate(unique_links, 1):

              print(f"\n🔍 [{idx}/{len(unique_links)}] Resolving...")
              print(telegram_link)

              raw_url = None
              file_name = None

              ################################################################
              # Method 1
              ################################################################

              try:
                  encoded = urllib.parse.quote(telegram_link)

                  result = subprocess.run([
                      "curl",
                      "-s",
                      "--max-time", "30",
                      "-X", "POST",
                      "-H", "Content-Type: application/x-www-form-urlencoded",
                      "-d", f"telegram_link={encoded}",
                      "https://telegramdownloader.net/proxy.php"
                  ], capture_output=True, text=True)

                  if result.returncode == 0 and result.stdout:

                      data = json.loads(result.stdout)

                      raw_url = (
                          data.get("data", {})
                              .get("data", {})
                              .get("link")
                      )

                      file_name = (
                          data.get("data", {})
                              .get("data", {})
                              .get("file_name")
                      )

                      if raw_url:
                          print("✅ Method 1 success")

              except Exception as e:
                  print("⚠️ Method 1 failed:", e)

              ################################################################
              # Method 2
              ################################################################

              if not raw_url:
                  try:

                      result = subprocess.run([
                          "curl",
                          "-s",
                          "--max-time", "30",
                          "-X", "POST",
                          "-H", "Content-Type: application/json",
                          "-d", json.dumps({"url": telegram_link}),
                          "https://api.tgsave.com/download"
                      ], capture_output=True, text=True)

                      if result.returncode == 0 and result.stdout:

                          data = json.loads(result.stdout)

                          raw_url = (
                              data.get("url")
                              or data.get("link")
                              or data.get("download_url")
                          )

                          file_name = (
                              data.get("filename")
                              or data.get("file_name")
                              or data.get("name")
                          )

                          if raw_url:
                              print("✅ Method 2 success")

                  except Exception as e:
                      print("⚠️ Method 2 failed:", e)

              ################################################################
              # Method 3
              ################################################################

              if not raw_url:
                  try:

                      result = subprocess.run([
                          "curl",
                          "-sL",
                          "--max-time", "20",
                          telegram_link
                      ], capture_output=True, text=True)

                      if result.returncode == 0:

                          match = re.search(
                              r'https://cdn[0-9]*\.telesco\.pe/file/[^"]+',
                              result.stdout
                          )

                          if match:
                              raw_url = match.group(0)

                              file_name = raw_url.split("/")[-1]

                              print("✅ Method 3 success")

                  except Exception as e:
                      print("⚠️ Method 3 failed:", e)

              ################################################################

              if raw_url:

                  if not file_name:
                      file_name = raw_url.split("/")[-1].split("?")[0]

                  file_name = urllib.parse.unquote(file_name)

                  downloads.append({
                      "telegram_link": telegram_link,
                      "download_url": raw_url,
                      "file_name": file_name
                  })

                  print("📄", file_name)

              else:
                  failed.append(telegram_link)
                  print("❌ Failed")

          with open("/tmp/downloads.json", "w") as f:
              json.dump(downloads, f)

          with open("/tmp/failed.json", "w") as f:
              json.dump(failed, f)

          print(f"\n✅ Resolved: {len(downloads)}")
          print(f"❌ Failed: {len(failed)}")

          if not downloads:
              raise SystemExit(1)

          PYEOF

      ####################################################################
      # Download Files
      ####################################################################

      - name: ⬇️ Download Files
        run: |
          python3 << 'PYEOF'
          import os
          import re
          import json
          import hashlib
          import subprocess

          MAX_RETRIES = 3

          def sanitize(filename):

              base, ext = os.path.splitext(filename)

              if not ext:
                  ext = ".bin"

              safe = re.sub(r'[^a-zA-Z0-9._-]', '_', base)

              safe = re.sub(r'_+', '_', safe)

              safe = safe.strip('_.-')

              if not safe:
                  safe = hashlib.md5(filename.encode()).hexdigest()[:12]

              return safe + ext.lower()

          with open("/tmp/downloads.json") as f:
              downloads = json.load(f)

          results = []

          for idx, item in enumerate(downloads, 1):

              url = item["download_url"]
              original_name = item["file_name"]

              safe_name = sanitize(original_name)

              folder_name = os.path.splitext(safe_name)[0]

              folder_path = os.path.join("downloads", folder_name)

              os.makedirs(folder_path, exist_ok=True)

              output_path = os.path.join(folder_path, safe_name)

              print(f"\n⬇️ [{idx}/{len(downloads)}]")
              print(original_name)

              success = False

              for attempt in range(1, MAX_RETRIES + 1):

                  print(f"🔄 Attempt {attempt}")

                  result = subprocess.run([
                      "aria2c",
                      "--max-connection-per-server=1",
                      "--split=1",
                      "--continue=true",
                      "--max-tries=10",
                      "--retry-wait=5",
                      "--timeout=600",
                      "--dir=" + folder_path,
                      "--out=" + safe_name,
                      url
                  ])

                  if (
                      result.returncode == 0
                      and os.path.exists(output_path)
                      and os.path.getsize(output_path) > 1024
                  ):
                      success = True
                      break

              if success:

                  size_mb = os.path.getsize(output_path) / (1024 * 1024)

                  print(f"✅ Downloaded ({size_mb:.2f} MB)")

                  results.append({
                      "status": "success",
                      "original_name": original_name,
                      "folder_name": folder_name,
                      "filename": safe_name,
                      "size_mb": round(size_mb, 2)
                  })

              else:

                  results.append({
                      "status": "failed",
                      "original_name": original_name
                  })

                  print("❌ Download failed")

          with open("/tmp/results.json", "w") as f:
              json.dump(results, f)

          successful = [x for x in results if x["status"] == "success"]

          if not successful:
              raise SystemExit(1)

          PYEOF

      ####################################################################
      # Split Large Files
      ####################################################################

      - name: 📦 Split Large Files
        run: |
          python3 << 'PYEOF'
          import os
          import json
          import subprocess
          import glob

          PASSWORD = """${{ github.event.inputs.password }}"""

          MAX_MB = 70

          COMPRESSED = {
              ".zip",
              ".rar",
              ".7z",
              ".gz",
              ".xz",
              ".bz2",
              ".tar"
          }

          with open("/tmp/results.json") as f:
              results = json.load(f)

          final_results = []

          for item in results:

              if item["status"] != "success":
                  final_results.append(item)
                  continue

              folder = item["folder_name"]
              filename = item["filename"]

              folder_path = os.path.join("downloads", folder)

              filepath = os.path.join(folder_path, filename)

              if not os.path.exists(filepath):
                  continue

              size_mb = os.path.getsize(filepath) / (1024 * 1024)

              ext = os.path.splitext(filename)[1].lower()

              entry = item.copy()

              entry["parts"] = []

              print(f"\n📦 Processing {filename}")

              ################################################################
              # Already compressed → split only
              ################################################################

              if ext in COMPRESSED and size_mb > MAX_MB:

                  os.chdir(folder_path)

                  subprocess.run([
                      "split",
                      "-b", f"{MAX_MB}m",
                      "-d",
                      "--additional-suffix=.part",
                      filename,
                      filename + "."
                  ])

                  parts = sorted(glob.glob(f"{filename}.*.part"))

                  os.remove(filename)

                  for part in parts:
                      part_size = os.path.getsize(part) / (1024 * 1024)

                      entry["parts"].append({
                          "name": part,
                          "size_mb": round(part_size, 2)
                      })

                  os.chdir("../../")

              ################################################################
              # Large normal file
              ################################################################

              elif size_mb > MAX_MB:

                  os.chdir(folder_path)

                  archive = filename + ".7z"

                  cmd = [
                      "7z",
                      "a",
                      f"-v{MAX_MB}m",
                      archive,
                      filename
                  ]

                  if PASSWORD:
                      cmd.insert(2, f"-p{PASSWORD}")
                      cmd.insert(3, "-mhe=on")
                  else:
                      cmd.insert(2, "-mx=0")

                  result = subprocess.run(cmd)

                  if result.returncode == 0:

                      os.remove(filename)

                      parts = sorted(glob.glob(f"{archive}.*"))

                      for part in parts:

                          part_size = os.path.getsize(part) / (1024 * 1024)

                          entry["parts"].append({
                              "name": part,
                              "size_mb": round(part_size, 2)
                          })

                  os.chdir("../../")

              ################################################################
              # Small file
              ################################################################

              else:

                  entry["parts"].append({
                      "name": filename,
                      "size_mb": round(size_mb, 2)
                  })

              final_results.append(entry)

          with open("/tmp/final_results.json", "w") as f:
              json.dump(final_results, f)

          PYEOF

      ####################################################################
      # Generate Links.md
      ####################################################################

      - name: 📝 Generate Links.md
        run: |
          python3 << 'PYEOF'
          import json
          from datetime import datetime

          with open("/tmp/final_results.json") as f:
              results = json.load(f)

          now = datetime.now().strftime("%Y-%m-%d %H:%M:%S")

          lines = []

          lines.append("# 📥 Telegram Downloads")
          lines.append("")
          lines.append(f"Generated: {now}")
          lines.append("")

          success = [x for x in results if x["status"] == "success"]

          lines.append(f"✅ Files: {len(success)}")
          lines.append("")

          for idx, item in enumerate(success, 1):

              lines.append(f"## {idx}. {item['original_name']}")
              lines.append("")

              lines.append(f"- Size: {item['size_mb']} MB")
              lines.append(f"- Parts: {len(item['parts'])}")
              lines.append("")

              for part in item["parts"]:
                  lines.append(f"- `{part['name']}` ({part['size_mb']} MB)")

              lines.append("")

          with open("Links.md", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))

          print("✅ Links.md created")

          PYEOF

      ####################################################################
      # Create GitHub Release
      ####################################################################

      - name: 🚀 Create GitHub Release
        run: |
          TAG="telegram-download-${GITHUB_RUN_NUMBER}"

          gh release create "$TAG" \
            --title "Telegram Download #${GITHUB_RUN_NUMBER}" \
            --notes-file Links.md

          find downloads -type f -print0 | \
          xargs -0 gh release upload "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      ####################################################################
      # Final Report
      ####################################################################

      - name: 📋 Final Report
        if: always()
        run: |
          echo ""
          echo "🎉 Workflow Completed"
          echo ""

          if [ -f "/tmp/final_results.json" ]; then
            python3 << 'PYEOF'
          import json

          with open("/tmp/final_results.json") as f:
              results = json.load(f)

          success = [x for x in results if x["status"] == "success"]
          failed = [x for x in results if x["status"] != "success"]

          print(f"✅ Successful: {len(success)}")
          print(f"❌ Failed: {len(failed)}")

          total = sum(x.get("size_mb", 0) for x in success)

          print(f"💾 Total Size: {total:.2f} MB")

          PYEOF
          fi
