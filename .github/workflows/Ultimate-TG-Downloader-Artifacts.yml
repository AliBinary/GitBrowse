name: 📲 Telegram Downloader (Per-File ZIP Artifacts)

on:
  workflow_dispatch:
    inputs:
      telegram_links:
        description: 'Telegram links (comma / space / newline separated)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: read

    steps:

      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl wget jq zip unzip aria2 python3 python3-pip

          pip3 install requests aiohttp beautifulsoup4 lxml telethon yt-dlp

      - name: 📁 Prepare workspace
        run: |
          mkdir -p downloads temp zips

      # =========================
      # RESOLVE LINKS
      # =========================
      - name: 📋 Resolve links
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
        run: |

          python3 << 'PY'

import os, re, json, requests
from telethon.sync import TelegramClient
from telethon.sessions import StringSession

raw = """${{ github.event.inputs.telegram_links }}"""
links = list({l.strip() for l in re.split(r'[\s,]+', raw) if l.startswith("http")})

resolved = []

api_id = os.getenv("TG_API_ID")
api_hash = os.getenv("TG_API_HASH")
session = os.getenv("TG_SESSION")

client = None
if api_id and api_hash and session:
    client = TelegramClient(StringSession(session), int(api_id), api_hash)
    client.start()

def resolve_telethon(link):
    try:
        parts = link.rstrip("/").split("/")
        msg_id = int(parts[-1])
        channel = parts[-2]

        entity = client.get_input_entity(channel)
        msg = client.get_messages(entity, ids=msg_id)

        if not msg:
            return None

        name = msg.file.name if msg.file and msg.file.name else f"{msg_id}.bin"

        return {
            "mode": "telethon",
            "entity": channel,
            "message_id": msg_id,
            "file_name": name,
            "telegram_link": link
        }
    except:
        return None

for l in links:
    r = resolve_telethon(l)
    if r:
        resolved.append(r)

with open("/tmp/resolved.json", "w") as f:
    json.dump(resolved, f)

print("Resolved:", len(resolved))

PY

      # =========================
      # DOWNLOAD + ZIP PER FILE
      # =========================
      - name: ⬇️ Download + Zip per file
        run: |

          python3 << 'PY'

import os, json, re, requests, zipfile, shutil, hashlib

with open("/tmp/resolved.json") as f:
    items = json.load(f)

os.makedirs("downloads", exist_ok=True)
os.makedirs("zips", exist_ok=True)

def safe(name):
    return re.sub(r'[^\w\-. ]', '_', name)[:180]

def download_file(url, path):
    try:
        r = requests.get(url, stream=True, timeout=120)
        if r.status_code != 200:
            return False

        with open(path, "wb") as f:
            for chunk in r.iter_content(1024*1024):
                if chunk:
                    f.write(chunk)

        return True
    except:
        return False

downloaded = []

for i, item in enumerate(items, 1):

    fname = safe(item["file_name"])
    base = os.path.splitext(fname)[0]

    folder = os.path.join("downloads", base)
    os.makedirs(folder, exist_ok=True)

    file_path = os.path.join(folder, fname)

    print(f"\n[{i}/{len(items)}] {fname}")

    # -------------------------
    # TELETHON DIRECT DOWNLOAD
    # -------------------------
    try:
        from telethon.sync import TelegramClient
        from telethon.sessions import StringSession

        api_id = os.getenv("TG_API_ID")
        api_hash = os.getenv("TG_API_HASH")
        session = os.getenv("TG_SESSION")

        client = TelegramClient(StringSession(session), int(api_id), api_hash)
        client.start()

        entity = client.get_input_entity(item["entity"])
        msg = client.get_messages(entity, ids=item["message_id"])

        if msg:
            print("Downloading via Telethon...")
            msg.download_media(file=file_path)

    except Exception as e:
        print("Telethon failed:", e)

    # -------------------------
    # ZIP PER FILE
    # -------------------------
    zip_path = os.path.join("zips", f"{base}.zip")

    with zipfile.ZipFile(zip_path, "w", zipfile.ZIP_DEFLATED) as z:
        for root, _, files in os.walk(folder):
            for f in files:
                full = os.path.join(root, f)
                arc = os.path.relpath(full, folder)
                z.write(full, arc)

    size_mb = os.path.getsize(zip_path) / (1024*1024)

    print("Zipped:", zip_path, f"{size_mb:.2f} MB")

    downloaded.append({
        "file": fname,
        "zip": zip_path
    })

with open("/tmp/zipped.json", "w") as f:
    json.dump(downloaded, f)

print("Done:", len(downloaded))

PY

      # =========================
      # UPLOAD EACH ZIP AS ARTIFACT
      # =========================
      - name: 📦 Upload per-file artifacts
        run: |

          mkdir -p artifact_upload

          python3 << 'PY'

import json, shutil, os

with open("/tmp/zipped.json") as f:
    items = json.load(f)

os.makedirs("artifact_upload", exist_ok=True)

for i, item in enumerate(items, 1):
    src = item["zip"]
    dst = os.path.join("artifact_upload", os.path.basename(src))

    shutil.copy(src, dst)

print("Prepared artifacts:", len(items))

PY

      - name: 📤 Upload artifacts (per file zip)
        uses: actions/upload-artifact@v4
        with:
          name: telegram-files
          path: artifact_upload/
          retention-days: 7
          compression-level: 0
