# ================================
# Ultimate Telegram Downloader
# Multi-Resolver + Multi-Downloader
# GitHub Actions Edition
# ================================

name: 📲 Ultimate Telegram Downloader

on:
  workflow_dispatch:
    inputs:
      telegram_links:
        description: '🔗 Telegram links (comma / space / newline separated)'
        required: true
        type: string

      password:
        description: '🔐 Optional archive password'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: read

    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Install dependencies
        run: |
          sudo apt-get update -qq

          sudo apt-get install -y \
            curl \
            wget \
            jq \
            aria2 \
            p7zip-full \
            unzip \
            zip \
            ffmpeg \
            python3 \
            python3-pip

          pip3 install --upgrade pip

          pip3 install \
            requests \
            aiohttp \
            yt-dlp \
            beautifulsoup4 \
            lxml

          echo "✅ Dependencies installed"

      - name: 📁 Prepare workspace
        run: |
          mkdir -p downloads
          mkdir -p temp

      - name: 📋 Resolve Telegram URLs
        run: |
          python3 << 'PYEOF'
          import os
          import re
          import json
          import urllib.parse
          import subprocess
          import requests
          from bs4 import BeautifulSoup

          raw_input = """${{ github.event.inputs.telegram_links }}"""

          # =====================================================
          # INPUT LINKS
          # =====================================================

          links = re.split(r'[\s,\n]+', raw_input)

          links = [
              l.strip()
              for l in links
              if l.strip().startswith("http")
          ]

          # Remove duplicates
          seen = set()
          unique_links = []

          for link in links:
              if link not in seen:
                  seen.add(link)
                  unique_links.append(link)

          print(f"✅ Total unique links: {len(unique_links)}")

          # =====================================================
          # URL FILTERING
          # =====================================================

          BAD_PATTERNS = (
              "data:image",
              "svg+xml",
              "base64,",
              "blob:",
              "javascript:",
              "emoji",
              "/emoji/",
              "placeholder",
          )

          VALID_EXTENSIONS = (
              ".mp4",
              ".mkv",
              ".mov",
              ".avi",
              ".zip",
              ".rar",
              ".7z",
              ".pdf",
              ".mp3",
              ".wav",
              ".flac",
              ".jpg",
              ".jpeg",
              ".png",
              ".webp",
              ".epub",
              ".txt",
              ".doc",
              ".docx",
              ".xlsx",
              ".pptx",
          )

          def is_valid_download_url(url):

              if not url:
                  return False

              url = url.strip()

              if not (
                  url.startswith("http://")
                  or
                  url.startswith("https://")
              ):
                  return False

              lower = url.lower()

              for bad in BAD_PATTERNS:
                  if bad in lower:
                      return False

              return True

          def clean_filename(name):

              if not name:
                  return None

              name = name.split("?")[0]
              name = os.path.basename(name)

              return name[:180]

          # =====================================================
          # RESOLVERS
          # =====================================================

          resolved = []
          failed = []

          HEADERS = {
              "User-Agent": "Mozilla/5.0"
          }

          def try_telegramdownloader(link):

              try:

                  encoded = urllib.parse.quote(link)

                  r = requests.post(
                      "https://telegramdownloader.net/proxy.php",
                      headers={
                          **HEADERS,
                          "Content-Type": "application/x-www-form-urlencoded"
                      },
                      data=f"telegram_link={encoded}",
                      timeout=30
                  )

                  data = r.json()

                  raw = data.get("data", {}).get("data", {}).get("link")
                  name = data.get("data", {}).get("data", {}).get("file_name")

                  if raw and is_valid_download_url(raw):
                      return raw, clean_filename(name)

              except:
                  pass

              return None, None

          def try_tgsave(link):

              try:

                  r = requests.post(
                      "https://api.tgsave.com/download",
                      headers={
                          **HEADERS,
                          "Content-Type": "application/json"
                      },
                      json={"url": link},
                      timeout=30
                  )

                  data = r.json()

                  raw = (
                      data.get("url")
                      or data.get("link")
                      or data.get("download_url")
                  )

                  name = (
                      data.get("filename")
                      or data.get("file_name")
                      or data.get("name")
                  )

                  if raw and is_valid_download_url(raw):
                      return raw, clean_filename(name)

              except:
                  pass

              return None, None

          def try_html_scrape(link):

              try:

                  r = requests.get(
                      link,
                      headers=HEADERS,
                      timeout=30
                  )

                  html = r.text

                  # =================================================
                  # DIRECT FILE PATTERNS
                  # =================================================

                  patterns = [

                      r'https://cdn[0-9]*\.telesco\.pe/file/[^\s"\']+',

                      r'https://[^"\']+\.(mp4|mkv|mov|avi|zip|rar|7z|pdf|mp3|wav|flac|jpg|jpeg|png|webp|epub|txt|docx?|xlsx?|pptx?)[^"\']*'
                  ]

                  for pattern in patterns:

                      matches = re.findall(pattern, html)

                      if matches:

                          # re.findall with groups may return tuples
                          if isinstance(matches[0], tuple):
                              continue

                          for url in matches:

                              if is_valid_download_url(url):

                                  filename = clean_filename(
                                      url.split("/")[-1]
                                  )

                                  return url, filename

                  # =================================================
                  # META TAGS
                  # =================================================

                  soup = BeautifulSoup(html, "lxml")

                  meta_tags = [

                      soup.find("meta", property="og:video"),
                      soup.find("meta", property="twitter:player"),
                      soup.find("meta", property="og:audio"),

                  ]

                  for tag in meta_tags:

                      if not tag:
                          continue

                      url = tag.get("content")

                      if not url:
                          continue

                      if not is_valid_download_url(url):
                          continue

                      filename = clean_filename(
                          url.split("/")[-1]
                      )

                      return url, filename

              except:
                  pass

              return None, None

          def try_ytdlp_resolve(link):

              try:

                  result = subprocess.run(
                      [
                          "yt-dlp",
                          "--get-url",
                          link
                      ],
                      capture_output=True,
                      text=True,
                      timeout=60
                  )

                  if result.returncode == 0:

                      urls = result.stdout.strip().splitlines()

                      for url in urls:

                          if is_valid_download_url(url):
                              return url, None

              except:
                  pass

              return None, None

          # =====================================================
          # RESOLVER PIPELINE
          # =====================================================

          resolvers = [

              ("telegramdownloader", try_telegramdownloader),

              ("tgsave", try_tgsave),

              ("html_scrape", try_html_scrape),

              ("yt-dlp", try_ytdlp_resolve),
          ]

          for idx, link in enumerate(unique_links, 1):

              print("\n" + "="*60)
              print(f"[{idx}/{len(unique_links)}] {link}")
              print("="*60)

              success = False

              for resolver_name, resolver in resolvers:

                  print(f"🔍 Trying resolver: {resolver_name}")

                  raw_url, file_name = resolver(link)

                  if raw_url:

                      if not is_valid_download_url(raw_url):

                          print("⚠️ Invalid URL filtered")
                          continue

                      print(f"✅ Success via {resolver_name}")

                      if not file_name:

                          file_name = clean_filename(
                              raw_url.split("/")[-1]
                          )

                      if not file_name:
                          file_name = "downloaded_file"

                      resolved.append({
                          "telegram_link": link,
                          "download_url": raw_url,
                          "file_name": file_name,
                          "resolver": resolver_name
                      })

                      success = True
                      break

                  else:
                      print(f"⚠️ Failed: {resolver_name}")

              if not success:
                  failed.append(link)

          # =====================================================
          # REMOVE DUPLICATES
          # =====================================================

          unique_resolved = []
          seen_urls = set()

          for item in resolved:

              if item["download_url"] not in seen_urls:

                  seen_urls.add(item["download_url"])
                  unique_resolved.append(item)

          resolved = unique_resolved

          # =====================================================
          # SAVE
          # =====================================================

          with open("/tmp/resolved.json", "w") as f:
              json.dump(resolved, f)

          with open("/tmp/failed_links.json", "w") as f:
              json.dump(failed, f)

          print("\n========================")
          print("📊 RESOLVE SUMMARY")
          print("========================")
          print(f"✅ Resolved: {len(resolved)}")
          print(f"❌ Failed: {len(failed)}")

          if not resolved:
              raise Exception("No links resolved")

          PYEOF

        
      - name: ⬇️ Download Files
        run: |
          python3 << 'PYEOF'
          import os
          import re
          import json
          import asyncio
          import aiohttp
          import hashlib
          import subprocess
          import requests

          with open("/tmp/resolved.json", "r") as f:
              items = json.load(f)

          os.makedirs("downloads", exist_ok=True)

          def sanitize(name):
              name = name.split("?")[0]
              name = re.sub(r'[^a-zA-Z0-9._-]', '_', name)

              if not name:
                  name = hashlib.md5(name.encode()).hexdigest()

              return name[:180]

          async def aio_download(url, path):

              try:
                  timeout = aiohttp.ClientTimeout(total=7200)

                  async with aiohttp.ClientSession(timeout=timeout) as session:

                      async with session.get(url) as resp:

                          if resp.status != 200:
                              return False

                          with open(path, "wb") as f:
                              async for chunk in resp.content.iter_chunked(1024*1024):
                                  f.write(chunk)

                  return os.path.exists(path)

              except:
                  return False

          def download_requests(url, path):

              try:
                  r = requests.get(
                      url,
                      stream=True,
                      timeout=120
                  )

                  with open(path, "wb") as f:
                      for chunk in r.iter_content(chunk_size=1024*1024):
                          if chunk:
                              f.write(chunk)

                  return os.path.exists(path)

              except:
                  return False

          def run_cmd(cmd, path):

              try:
                  subprocess.run(
                      cmd,
                      timeout=7200,
                      check=True
                  )

                  return os.path.exists(path)

              except:
                  return False

          downloaded = []
          failed = []

          for idx, item in enumerate(items, 1):

              url = item["download_url"]

              filename = sanitize(item["file_name"])

              folder = os.path.join(
                  "downloads",
                  os.path.splitext(filename)[0]
              )

              os.makedirs(folder, exist_ok=True)

              path = os.path.join(folder, filename)

              print("\n" + "="*60)
              print(f"⬇️ [{idx}/{len(items)}] {filename}")
              print("="*60)

              methods = [

                  (
                      "curl",
                      lambda:
                      run_cmd([
                          "curl",
                          "-L",
                          "-o",
                          path,
                          url
                      ], path)
                  ),

                  (
                      "wget",
                      lambda:
                      run_cmd([
                          "wget",
                          "-O",
                          path,
                          url
                      ], path)
                  ),

                  (
                      "aria2c",
                      lambda:
                      run_cmd([
                          "aria2c",
                          "--dir",
                          folder,
                          "--out",
                          filename,
                          url
                      ], path)
                  ),

                  (
                      "yt-dlp",
                      lambda:
                      run_cmd([
                          "yt-dlp",
                          "-o",
                          path,
                          url
                      ], path)
                  ),

                  (
                      "python_requests",
                      lambda:
                      download_requests(url, path)
                  ),

                  (
                      "aiohttp",
                      lambda:
                      asyncio.run(aio_download(url, path))
                  ),

              ]

              success = False

              for method_name, method in methods:

                  print(f"🔄 Trying: {method_name}")

                  try:

                      if os.path.exists(path):
                          os.remove(path)

                      ok = method()

                      if ok and os.path.getsize(path) > 1024:

                          size_mb = os.path.getsize(path) / (1024*1024)

                          print(f"✅ Success via {method_name}")
                          print(f"📦 Size: {size_mb:.2f} MB")

                          downloaded.append({
                              "filename": filename,
                              "folder": folder,
                              "size_mb": round(size_mb, 2),
                              "method": method_name,
                              "telegram_link": item["telegram_link"]
                          })

                          success = True
                          break

                      else:
                          print(f"⚠️ Failed via {method_name}")

                  except Exception as e:
                      print(f"⚠️ Error: {e}")

              if not success:

                  failed.append({
                      "filename": filename,
                      "telegram_link": item["telegram_link"]
                  })

          with open("/tmp/downloaded.json", "w") as f:
              json.dump(downloaded, f)

          with open("/tmp/failed_downloads.json", "w") as f:
              json.dump(failed, f)

          print("\n========================")
          print("📊 DOWNLOAD SUMMARY")
          print("========================")
          print(f"✅ Downloaded: {len(downloaded)}")
          print(f"❌ Failed: {len(failed)}")

          if not downloaded:
              raise Exception("No successful downloads")
          PYEOF

      - name: 📦 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telegram-downloads
          path: downloads/
          retention-days: 7
          compression-level: 0

      - name: 📋 Final Report
        if: always()
        run: |
          echo ""
          echo "======================================="
          echo "📲 Ultimate Telegram Downloader"
          echo "======================================="

          if [ -f "/tmp/downloaded.json" ]; then
            COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/downloaded.json'))))")
            echo "✅ Downloaded: $COUNT"
          fi

          if [ -f "/tmp/failed_downloads.json" ]; then
            FAIL=$(python3 -c "import json; print(len(json.load(open('/tmp/failed_downloads.json'))))")
            echo "❌ Failed: $FAIL"
          fi

          echo ""
          echo "📦 Delivery Method:"
          echo "GitHub Artifacts"
          echo ""

          find downloads -type f -exec ls -lh {} \;
