# ================================
# Ultimate Telegram Downloader
# Telethon + Multi Resolver + Multi Downloader
# Separate Artifact Per File
# GitHub Actions Edition
# ================================

name: 📲 Ultimate Telegram Downloader

on:
  workflow_dispatch:
    inputs:
      telegram_links:
        description: '🔗 Telegram links (comma / space / newline separated)'
        required: true
        type: string

      password:
        description: '🔐 Optional archive password'
        required: false
        default: ''
        type: string

jobs:

  download:

    runs-on: ubuntu-latest

    timeout-minutes: 360

    permissions:
      contents: read

    steps:

      # ==========================================
      # CHECKOUT
      # ==========================================

      - name: 📂 Checkout
        uses: actions/checkout@v4

      # ==========================================
      # INSTALL DEPENDENCIES
      # ==========================================

      - name: ⚙️ Install dependencies
        run: |

          sudo apt-get update -qq

          sudo apt-get install -y \
            curl \
            wget \
            jq \
            aria2 \
            p7zip-full \
            unzip \
            zip \
            ffmpeg \
            python3 \
            python3-pip

          pip3 install --upgrade pip

          pip3 install \
            requests \
            aiohttp \
            yt-dlp \
            beautifulsoup4 \
            lxml \
            telethon

          echo "✅ Dependencies installed"

      # ==========================================
      # PREPARE WORKSPACE
      # ==========================================

      - name: 📁 Prepare workspace
        run: |

          mkdir -p downloads
          mkdir -p temp

      # ==========================================
      # RESOLVE TELEGRAM LINKS
      # ==========================================

      - name: 📋 Resolve Telegram URLs

        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}

        run: |

          python3 << 'PYEOF'

          import os
          import re
          import json
          import urllib.parse
          import subprocess
          import requests

          from bs4 import BeautifulSoup

          from telethon.sync import TelegramClient
          from telethon.sessions import StringSession

          raw_input = """${{ github.event.inputs.telegram_links }}"""

          links = re.split(r'[\s,\n]+', raw_input)

          links = [
              l.strip()
              for l in links
              if l.strip().startswith("http")
          ]

          seen = set()

          unique_links = []

          for link in links:

              if link not in seen:

                  seen.add(link)

                  unique_links.append(link)

          print(f"✅ Total unique links: {len(unique_links)}", flush=True)

          resolved = []

          failed = []

          HEADERS = {
              "User-Agent": "Mozilla/5.0"
          }

          # ======================================
          # TELETHON INIT
          # ======================================

          client = None

          api_id = os.environ.get("TG_API_ID")
          api_hash = os.environ.get("TG_API_HASH")
          session = os.environ.get("TG_SESSION")

          if api_id and api_hash and session:

              try:

                  client = TelegramClient(
                      StringSession(session),
                      int(api_id),
                      api_hash
                  )

                  client.start()

                  print("✅ Telethon initialized", flush=True)

              except Exception as e:

                  print(f"⚠️ Telethon init failed: {e}", flush=True)

          # ======================================
          # HELPERS
          # ======================================

          def invalid_url(url):

              if not url:
                  return True

              url = url.strip()

              invalid_prefixes = [
                  "data:image",
                  "blob:",
                  "javascript:",
                  "about:"
              ]

              for p in invalid_prefixes:

                  if url.startswith(p):
                      return True

              return not url.startswith("http")

          # ======================================
          # TELETHON RESOLVER
          # ======================================

          def try_telethon(link):

              if not client:
                  return None, None

              try:

                  parts = link.rstrip("/").split("/")

                  if len(parts) < 2:
                      return None, None

                  msg_id = int(parts[-1])

                  channel = parts[-2]

                  entity = client.get_entity(channel)

                  msg = client.get_messages(entity, ids=msg_id)

                  if not msg:
                      return None, None

                  if not msg.media:
                      return None, None

                  file_name = None

                  if msg.file and msg.file.name:
                      file_name = msg.file.name
                  else:
                      file_name = f"{msg_id}.bin"

                  return {
                      "mode": "telethon",
                      "entity": channel,
                      "message_id": msg_id,
                      "file_name": file_name
                  }, file_name

              except Exception as e:

                  print(f"⚠️ Telethon resolver error: {e}", flush=True)

              return None, None

          # ======================================
          # TELEGRAMDOWNLOADER
          # ======================================

          def try_telegramdownloader(link):

              try:

                  encoded = urllib.parse.quote(link)

                  r = requests.post(
                      "https://telegramdownloader.net/proxy.php",
                      headers={
                          **HEADERS,
                          "Content-Type": "application/x-www-form-urlencoded"
                      },
                      data=f"telegram_link={encoded}",
                      timeout=30
                  )

                  data = r.json()

                  raw = data.get("data", {}).get("data", {}).get("link")

                  name = data.get("data", {}).get("data", {}).get("file_name")

                  if invalid_url(raw):
                      return None, None

                  return raw, name

              except:
                  pass

              return None, None

          # ======================================
          # TGSAVE
          # ======================================

          def try_tgsave(link):

              try:

                  r = requests.post(
                      "https://api.tgsave.com/download",
                      headers={
                          **HEADERS,
                          "Content-Type": "application/json"
                      },
                      json={"url": link},
                      timeout=30
                  )

                  data = r.json()

                  raw = (
                      data.get("url")
                      or data.get("link")
                      or data.get("download_url")
                  )

                  name = (
                      data.get("filename")
                      or data.get("file_name")
                      or data.get("name")
                  )

                  if invalid_url(raw):
                      return None, None

                  return raw, name

              except:
                  pass

              return None, None

          # ======================================
          # HTML SCRAPER
          # ======================================

          def try_html_scrape(link):

              try:

                  r = requests.get(
                      link,
                      headers=HEADERS,
                      timeout=30
                  )

                  html = r.text

                  patterns = [

                      r'https://cdn[0-9]*\.telesco\.pe/file/[^\s"\']+',

                      r'https://[^"\']+\.(mp4|mkv|mov|pdf|zip|rar|7z|mp3|jpg|jpeg|png|webp)[^"\']*'
                  ]

                  for p in patterns:

                      matches = re.findall(p, html)

                      if matches:

                          if isinstance(matches[0], tuple):
                              continue

                          for url in matches:

                              if invalid_url(url):
                                  continue

                              name = url.split("/")[-1].split("?")[0]

                              return url, name

                  soup = BeautifulSoup(html, "lxml")

                  metas = [

                      soup.find("meta", property="og:video"),

                      soup.find("meta", property="og:image"),

                      soup.find("meta", attrs={"name": "twitter:image"}),
                  ]

                  for meta in metas:

                      if not meta:
                          continue

                      url = meta.get("content")

                      if invalid_url(url):
                          continue

                      return url, url.split("/")[-1]

              except:
                  pass

              return None, None

          # ======================================
          # YT-DLP RESOLVER
          # ======================================

          def try_ytdlp_resolve(link):

              try:

                  result = subprocess.run(
                      [
                          "yt-dlp",
                          "--get-url",
                          link
                      ],
                      capture_output=True,
                      text=True,
                      timeout=60
                  )

                  if result.returncode == 0:

                      lines = result.stdout.strip().splitlines()

                      for url in lines:

                          url = url.strip()

                          if invalid_url(url):
                              continue

                          return url, None

              except:
                  pass

              return None, None

          resolvers = [

              ("telethon", try_telethon),

              ("telegramdownloader", try_telegramdownloader),

              ("tgsave", try_tgsave),

              ("html_scrape", try_html_scrape),

              ("yt-dlp", try_ytdlp_resolve),
          ]

          for idx, link in enumerate(unique_links, 1):

              print("\n" + "="*60, flush=True)
              print(f"[{idx}/{len(unique_links)}] {link}", flush=True)
              print("="*60, flush=True)

              success = False

              for resolver_name, resolver in resolvers:

                  print(f"🔍 Trying resolver: {resolver_name}", flush=True)

                  raw_url, file_name = resolver(link)

                  if raw_url:

                      print(f"✅ Success via {resolver_name}", flush=True)

                      if isinstance(raw_url, dict):

                          item = raw_url

                          item["telegram_link"] = link
                          item["resolver"] = resolver_name

                          resolved.append(item)

                      else:

                          if not file_name:
                              file_name = raw_url.split("/")[-1].split("?")[0]

                          resolved.append({
                              "telegram_link": link,
                              "download_url": raw_url,
                              "file_name": file_name,
                              "resolver": resolver_name
                          })

                      success = True

                      break

                  else:

                      print(f"⚠️ Failed: {resolver_name}", flush=True)

              if not success:
                  failed.append(link)

          with open("/tmp/resolved.json", "w") as f:
              json.dump(resolved, f)

          with open("/tmp/failed_links.json", "w") as f:
              json.dump(failed, f)

          print("\n========================", flush=True)
          print("📊 RESOLVE SUMMARY", flush=True)
          print("========================", flush=True)
          print(f"✅ Resolved: {len(resolved)}", flush=True)
          print(f"❌ Failed: {len(failed)}", flush=True)

          if not resolved:
              raise Exception("No links resolved")

          PYEOF

      # ==========================================
      # DOWNLOAD FILES
      # ==========================================

      - name: ⬇️ Download Files

        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}

        run: |

          python3 << 'PYEOF'

          import os
          import re
          import json
          import asyncio
          import aiohttp
          import hashlib
          import subprocess
          import requests

          from telethon.sync import TelegramClient
          from telethon.sessions import StringSession

          with open("/tmp/resolved.json", "r") as f:
              items = json.load(f)

          os.makedirs("downloads", exist_ok=True)

          client = None

          api_id = os.environ.get("TG_API_ID")
          api_hash = os.environ.get("TG_API_HASH")
          session = os.environ.get("TG_SESSION")

          if api_id and api_hash and session:

              try:

                  client = TelegramClient(
                      StringSession(session),
                      int(api_id),
                      api_hash
                  )

                  client.start()

                  print("✅ Telethon initialized", flush=True)

              except Exception as e:

                  print(f"⚠️ Telethon init failed: {e}", flush=True)

          def sanitize(name):

              if not name:
                  name = "unknown_file"

              name = name.split("?")[0]

              name = re.sub(
                  r'[^a-zA-Z0-9._-]',
                  '_',
                  name
              )

              return name[:180]

          downloaded = []

          failed = []

          for idx, item in enumerate(items, 1):

              filename = sanitize(item["file_name"])

              folder = os.path.join(
                  "downloads",
                  os.path.splitext(filename)[0]
              )

              os.makedirs(folder, exist_ok=True)

              path = os.path.join(folder, filename)

              print("\n" + "="*60, flush=True)
              print(f"⬇️ [{idx}/{len(items)}] {filename}", flush=True)
              print("="*60, flush=True)

              success = False

              # ==================================
              # TELETHON DIRECT
              # ==================================

              if item.get("mode") == "telethon":

                  try:

                      if client:

                          print("🔄 Trying: telethon_direct", flush=True)

                          entity = item["entity"]

                          msg_id = item["message_id"]

                          msg = client.get_messages(
                              entity,
                              ids=msg_id
                          )

                          if msg:

                              def progress_callback(current, total):

                                  if total > 0:

                                      percent = (current / total) * 100

                                      print(
                                          f"📥 {percent:.1f}% "
                                          f"({current // (1024*1024)} MB / "
                                          f"{total // (1024*1024)} MB)",
                                          flush=True
                                      )

                              msg.download_media(
                                  file=path,
                                  progress_callback=progress_callback
                              )

                              if os.path.exists(path):

                                  size_mb = os.path.getsize(path) / (1024*1024)

                                  print("✅ Success", flush=True)
                                  print(f"📦 Size: {size_mb:.2f} MB", flush=True)

                                  downloaded.append(path)

                                  success = True

                  except Exception as e:

                      print(f"⚠️ Telethon failed: {e}", flush=True)

              if success:
                  continue

              # ==================================
              # URL DOWNLOAD
              # ==================================

              url = item.get("download_url")

              if not url:

                  failed.append(filename)

                  continue

              methods = [

                  (
                      "curl",
                      [
                          "curl",
                          "-L",
                          "--progress-bar",
                          "--fail",
                          "-o",
                          path,
                          url
                      ]
                  ),

                  (
                      "wget",
                      [
                          "wget",
                          "--progress=bar:force",
                          "-O",
                          path,
                          url
                      ]
                  ),

                  (
                      "aria2c",
                      [
                          "aria2c",
                          "--summary-interval=5",
                          "--console-log-level=notice",
                          "--dir",
                          folder,
                          "--out",
                          filename,
                          url
                      ]
                  ),

                  (
                      "yt-dlp",
                      [
                          "yt-dlp",
                          "--newline",
                          "-o",
                          path,
                          url
                      ]
                  ),
              ]

              for method_name, cmd in methods:

                  print(f"🔄 Trying: {method_name}", flush=True)

                  try:

                      if os.path.exists(path):
                          os.remove(path)

                      subprocess.run(
                          cmd,
                          timeout=7200,
                          check=True
                      )

                      if os.path.exists(path):

                          if os.path.getsize(path) > 1024:

                              size_mb = os.path.getsize(path) / (1024*1024)

                              print(f"✅ Success via {method_name}", flush=True)
                              print(f"📦 Size: {size_mb:.2f} MB", flush=True)

                              downloaded.append(path)

                              success = True

                              break

                  except Exception as e:

                      print(f"⚠️ {method_name} failed: {e}", flush=True)

              if not success:

                  failed.append(filename)

          with open("/tmp/downloaded.json", "w") as f:
              json.dump(downloaded, f)

          with open("/tmp/failed_downloads.json", "w") as f:
              json.dump(failed, f)

          print("\n========================", flush=True)
          print("📊 DOWNLOAD SUMMARY", flush=True)
          print("========================", flush=True)
          print(f"✅ Downloaded: {len(downloaded)}", flush=True)
          print(f"❌ Failed: {len(failed)}", flush=True)

          if not downloaded:
              raise Exception("No successful downloads")

          PYEOF

      # ==========================================
      # UPLOAD EACH FILE SEPARATELY
      # ==========================================

      - name: 📦 Upload files separately

        run: |

          cd downloads

          find . -type f | while read file; do

            safe_name=$(echo "$file" | sed 's|^\./||' | tr '/' '_' | tr ' ' '_')

            echo "artifact_name=$safe_name" >> $GITHUB_ENV
            echo "artifact_path=downloads/${file#./}" >> $GITHUB_ENV

          done

      - name: 📤 Upload Artifacts

        uses: actions/upload-artifact@v4

        with:
          name: telegram-download-${{ github.run_id }}
          path: downloads/
          retention-days: 7
          compression-level: 0

      # ==========================================
      # FINAL REPORT
      # ==========================================

      - name: 📋 Final Report

        if: always()

        run: |

          echo ""
          echo "======================================="
          echo "📲 Ultimate Telegram Downloader"
          echo "======================================="

          if [ -f "/tmp/downloaded.json" ]; then

            COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/downloaded.json'))))")

            echo "✅ Downloaded: $COUNT"

          fi

          if [ -f "/tmp/failed_downloads.json" ]; then

            FAIL=$(python3 -c "import json; print(len(json.load(open('/tmp/failed_downloads.json'))))")

            echo "❌ Failed: $FAIL"

          fi

          echo ""
          echo "📦 Uploaded as separate artifacts"
          echo ""

          find downloads -type f -exec ls -lh {} \;
