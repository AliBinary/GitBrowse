name: 📲 Ultimate Telegram Downloader (Release Edition)

on:
  workflow_dispatch:
    inputs:
      telegram_links:
        description: "Telegram links"
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:

      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl wget aria2 ffmpeg p7zip-full unzip zip python3 python3-pip
          pip3 install --upgrade pip
          pip3 install requests aiohttp yt-dlp beautifulsoup4 lxml telethon

      - name: 📁 Prepare workspace
        run: |
          mkdir -p downloads
          mkdir -p temp

      # =====================================================
      # RESOLVE STEP (MULTI-RESOLVER + TELETHON)
      # =====================================================
      - name: 📋 Resolve Telegram URLs
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}

        run: |

          python3 << 'PYEOF'

          import os, re, json, urllib.parse, subprocess, requests
          from bs4 import BeautifulSoup
          from telethon.sync import TelegramClient
          from telethon.sessions import StringSession

          raw_input = """${{ github.event.inputs.telegram_links }}"""

          links = [x.strip() for x in re.split(r'[\s,\n]+', raw_input) if x.startswith("http")]

          seen = set()
          unique_links = []

          for l in links:
              if l not in seen:
                  seen.add(l)
                  unique_links.append(l)

          print("Total links:", len(unique_links), flush=True)

          resolved = []
          failed = []

          def invalid_url(url):
              if not url:
                  return True
              return url.startswith(("blob:", "data:", "javascript:", "about:")) or not url.startswith("http")

          # ================= TELETHON =================

          client = None
          if os.getenv("TG_API_ID") and os.getenv("TG_SESSION"):
              client = TelegramClient(
                  StringSession(os.environ["TG_SESSION"]),
                  int(os.environ["TG_API_ID"]),
                  os.environ["TG_API_HASH"]
              )
              client.start()

          def telethon_resolver(link):
              if not client:
                  return None, None
              try:
                  parts = link.rstrip("/").split("/")
                  msg_id = int(parts[-1])
                  channel = parts[-2]

                  entity = client.get_entity(channel)
                  msg = client.get_messages(entity, ids=msg_id)

                  if not msg or not msg.media:
                      return None, None

                  name = msg.file.name if msg.file and msg.file.name else f"{msg_id}.bin"

                  return {
                      "mode": "telethon",
                      "entity": channel,
                      "message_id": msg_id,
                      "file_name": name
                  }, name

              except:
                  return None, None

          def tgsave(link):
              try:
                  r = requests.post("https://api.tgsave.com/download", json={"url": link}, timeout=30)
                  d = r.json()
                  url = d.get("url") or d.get("download_url")
                  name = d.get("filename")
                  if invalid_url(url):
                      return None, None
                  return url, name
              except:
                  return None, None

          def telegramdownloader(link):
              try:
                  r = requests.post(
                      "https://telegramdownloader.net/proxy.php",
                      data={"telegram_link": urllib.parse.quote(link)},
                      timeout=30
                  )
                  d = r.json()
                  url = d.get("data", {}).get("data", {}).get("link")
                  name = d.get("data", {}).get("data", {}).get("file_name")
                  if invalid_url(url):
                      return None, None
                  return url, name
              except:
                  return None, None

          def html_scrape(link):
              try:
                  r = requests.get(link, timeout=20)
                  urls = re.findall(r'https://[^"\']+\.(mp4|mkv|zip|rar|pdf|jpg|png)', r.text)
                  for u in urls:
                      if not invalid_url(u):
                          return u, u.split("/")[-1]
              except:
                  pass
              return None, None

          def ytdlp(link):
              try:
                  r = subprocess.run(["yt-dlp", "--get-url", link], capture_output=True, text=True)
                  for u in r.stdout.splitlines():
                      if u.startswith("http"):
                          return u, None
              except:
                  pass
              return None, None

          resolvers = [
              ("telethon", telethon_resolver),
              ("tgsave", tgsave),
              ("telegramdownloader", telegramdownloader),
              ("html", html_scrape),
              ("yt-dlp", ytdlp)
          ]

          for link in unique_links:
              print("\nLINK:", link, flush=True)

              ok = False

              for name, fn in resolvers:
                  print("Trying:", name, flush=True)
                  out, fname = fn(link)

                  if out:
                      resolved.append({
                          "telegram_link": link,
                          "download_url": out,
                          "file_name": fname,
                          "mode": "telethon" if isinstance(out, dict) else "url"
                      })
                      print("OK:", name, flush=True)
                      ok = True
                      break

              if not ok:
                  failed.append(link)

          json.dump(resolved, open("/tmp/resolved.json", "w"))
          json.dump(failed, open("/tmp/failed.json", "w"))

          print("Resolved:", len(resolved), flush=True)
          PYEOF

      # =====================================================
      # DOWNLOAD STEP (FIXED PROGRESS SYSTEM)
      # =====================================================

      - name: ⬇️ Download Files
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}

        run: |

          python3 << 'PYEOF'

          import os, json, re, subprocess, time
          from telethon.sync import TelegramClient
          from telethon.sessions import StringSession

          items = json.load(open("/tmp/resolved.json"))

          os.makedirs("downloads", exist_ok=True)

          client = None
          if os.getenv("TG_API_ID") and os.getenv("TG_SESSION"):
              client = TelegramClient(
                  StringSession(os.environ["TG_SESSION"]),
                  int(os.environ["TG_API_ID"]),
                  os.environ["TG_API_HASH"]
              )
              client.start()

          def sanitize(name):
              return re.sub(r'[^a-zA-Z0-9._-]', '_', name or "file")[:180]

          downloaded = []

          for i, item in enumerate(items, 1):

              name = sanitize(item["file_name"])
              path = os.path.join("downloads", name)

              print("\n", "="*50)
              print(f"[{i}/{len(items)}] {name}")

              success = False

              # ================= TELETHON DOWNLOAD =================
              if item.get("mode") == "telethon":

                  print("Telethon download...")

                  msg = client.get_messages(item["entity"], ids=item["message_id"])

                  progress = {
                      "last_time": time.time(),
                      "last": 0
                  }

                  def cb(current, total):

                      now = time.time()
                      delta_t = max(now - progress["last_time"], 0.1)
                      delta_b = current - progress["last"]

                      speed = (delta_b / 1024 / 1024) / delta_t if delta_t else 0

                      percent = (current / total * 100) if total else 0

                      eta = 0
                      if speed > 0 and total:
                          eta = ((total - current) / 1024 / 1024) / speed

                      print(
                          f"📥 {percent:.1f}% | "
                          f"{current//1024//1024}MB | "
                          f"⚡ {speed:.2f} MB/s | ETA {eta:.1f}s",
                          flush=True
                      )

                      progress["last_time"] = now
                      progress["last"] = current

                  msg.download_media(file=path, progress_callback=cb)

                  if os.path.exists(path):
                      print("OK telethon")
                      downloaded.append(path)
                      success = True

              if success:
                  continue

              # ================= URL DOWNLOAD =================
              url = item.get("download_url")

              methods = [
                  ["aria2c", ["aria2c", "-x16", "-s16", "-k1M", "-o", name, "-d", "downloads", url]],
                  ["curl", ["curl", "-L", "-o", path, url]],
                  ["wget", ["wget", "-O", path, url]]
              ]

              for m, cmd in methods:

                  print("Trying:", m)

                  try:
                      subprocess.run(cmd, check=True, timeout=7200)

                      if os.path.exists(path):
                          print("OK", m)
                          downloaded.append(path)
                          success = True
                          break

                  except Exception as e:
                      print("Fail:", m, e)

              if not success:
                  print("FAILED:", name)

          json.dump(downloaded, open("/tmp/downloaded.json", "w"))
          print("DONE:", len(downloaded))
          PYEOF

      # =====================================================
      # CREATE RELEASE
      # =====================================================

      - name: 🏷️ Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: run-${{ github.run_id }}
          name: Telegram Downloads ${{ github.run_id }}

      # =====================================================
      # UPLOAD TO RELEASE
      # =====================================================

      - name: 📤 Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: |

          for file in $(find downloads -type f); do
            echo "Uploading $file"
            gh release upload run-${{ github.run_id }} "$file" --clobber
          done

      # =====================================================
      # REPORT
      # =====================================================

      - name: 📋 Final Report
        if: always()
        run: |

          echo "DONE"
          find downloads -type f -exec ls -lh {} \;
