name: Move Artifact To Release With Progress (chatgpt)

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Workflow Run ID containing the artifact"
        required: true

      artifact_name:
        description: "Artifact name"
        required: true
        default: "telegram-downloads"

jobs:
  release-artifact:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: write

    steps:

      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download Artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.inputs.run_id }}
          name: ${{ github.event.inputs.artifact_name }}
          path: artifact

      - name: 📊 Show Artifact Size
        run: |
          echo "=============================="
          echo "Artifact Download Completed"
          echo "=============================="
          du -sh artifact || true

      - name: 🏷️ Generate Release Tag
        id: tag
        run: |
          TAG="artifact-${{ github.event.inputs.run_id }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: 📦 Install pv
        run: |
          sudo apt-get update
          sudo apt-get install -y pv zip

      - name: 🗜️ Compress With Progress
        run: |
          TOTAL_SIZE=$(du -sb artifact | awk '{print $1}')

          echo "=============================="
          echo "Compressing files..."
          echo "Total Size: $TOTAL_SIZE bytes"
          echo "=============================="

          tar cf - artifact \
            | pv -s $TOTAL_SIZE \
            | gzip > artifact.tar.gz

          ls -lh artifact.tar.gz

      - name: ✂️ Split Large Archive
        run: |
          mkdir -p split

          FILE_SIZE=$(stat -c%s artifact.tar.gz)
          LIMIT=$((1900 * 1024 * 1024))

          echo "=============================="
          echo "Archive Size: $FILE_SIZE"
          echo "Split Limit : $LIMIT"
          echo "=============================="

          if [ "$FILE_SIZE" -gt "$LIMIT" ]; then
            echo "Splitting archive..."

            split -b 1900M \
              --numeric-suffixes=1 \
              --suffix-length=3 \
              artifact.tar.gz \
              split/artifact.tar.gz.part_

          else
            mv artifact.tar.gz split/
          fi

          echo "=============================="
          echo "Generated Files:"
          echo "=============================="

          ls -lh split/

      - name: 🚀 Upload To GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Artifact Release ${{ github.event.inputs.run_id }}
          files: split/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Done
        run: |
          echo "=============================="
          echo "Release Upload Completed"
          echo "=============================="
