name: Deploy Past Artifact to Release (gemini)

on:
  workflow_dispatch:
    inputs:
      past_run_id:
        description: 'Enter the Run ID of the completed workflow'
        required: true
        type: string

permissions:
  contents: write # دسترسی لازم برای ساخت ریلیس

jobs:
  upload-past-artifact:
    runs-on: ubuntu-latest
    
    steps:
    # ۱. دانلود آرتیفکت از ران مشخص شده قبلی
    - name: Download Artifact from Past Run
      uses: actions/download-artifact@v4
      with:
        name: telegram-downloads # نام دقیق آرتیفکت شما
        run-id: ${{ github.event.inputs.past_run_id }}
        path: ./downloaded_artifact
        github-token: ${{ secrets.GITHUB_TOKEN }}

    # ۲. تقسیم فایل‌ها به پارت‌های ۱.۵ گیگابایتی (به دلیل حجم ۱۱.۳ گیگابایتی)
    - name: Split Large Files
      run: |
        mkdir -p split_assets
        cd downloaded_artifact
        for file in *; do
          if [ -f "$file" ]; then
            split -b 1500M "$file" "../split_assets/${file}.part_"
          fi
        done

    # ۳. ساخت ریلیس و آپلود پارت‌ها
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: release-${{ github.event.inputs.past_run_id }} # تگ بر اساس همان آیدی ران ساخته می‌شود
        name: "Release for Run #${{ github.event.inputs.past_run_id }}"
        draft: false
        prerelease: false
        files: |
          split_assets/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
